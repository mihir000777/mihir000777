<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#120e2e" />
      <stop offset="60%" stop-color="#05050a" />
      <stop offset="100%" stop-color="#020205" />
    </radialGradient>

    <!-- Neon Gradients -->
    <linearGradient id="neon-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <linearGradient id="neon-purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d946ef" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="cyan-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-intense" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e1b4b" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <style>
    /* CSS Animations */
    @keyframes pulse {
      0% { opacity: 0.3; }
      50% { opacity: 0.8; }
      100% { opacity: 0.3; }
    }
    @keyframes grid-travel {
      0% { transform: translateY(0); }
      100% { transform: translateY(30px); }
    }
    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
        opacity: 0.99;
        filter: drop-shadow(0 0 8px rgba(6, 182, 212, 0.6)) drop-shadow(0 0 20px rgba(168, 85, 247, 0.4));
      }
      20%, 24%, 55% {
        opacity: 0.4;
        filter: none;
      }
    }
    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(1deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    @keyframes scanner {
      0% { transform: translateY(0px); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(280px); opacity: 0; }
    }
    @keyframes dash {
      to {
        stroke-dashoffset: -40;
      }
    }
    @keyframes rotate-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Style Classes */
    .bg { fill: url(#bg-glow); }
    .grid-bg { fill: url(#grid); }
    .animated-grid {
      animation: grid-travel 4s linear infinite;
    }
    .neon-text-title {
      font-family: 'Segoe UI', -apple-system, Roboto, sans-serif;
      font-weight: 900;
      font-size: 42px;
      fill: #ffffff;
      letter-spacing: 6px;
      animation: flicker 6s infinite alternate;
    }
    .neon-text-subtitle {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      font-size: 16px;
      fill: #06b6d4;
      letter-spacing: 5px;
    }
    .scan-line {
      stroke: url(#neon-cyan);
      stroke-width: 1.5;
      opacity: 0.5;
      filter: url(#glow-cyan);
      animation: scanner 5s linear infinite;
    }
    .floating-box {
      animation: float 6s ease-in-out infinite;
    }
    .floating-box-delayed {
      animation: float 8s ease-in-out infinite;
      animation-delay: -3s;
    }
    .tech-node {
      fill: #020205;
      stroke: url(#cyan-purple);
      stroke-width: 2;
    }
    .pulse-glow {
      animation: pulse 2s infinite ease-in-out;
    }
    .connecting-line {
      stroke: url(#cyan-purple);
      stroke-width: 1.5;
      stroke-dasharray: 8 4;
      animation: dash 2s linear infinite;
    }
    .gear {
      transform-origin: center;
      animation: rotate-slow 20s linear infinite;
    }
  </style>

  <!-- Background -->
  <rect width="900" height="280" class="bg" />

  <!-- Animated Grid Overlay -->
  <g class="animated-grid">
    <rect width="900" height="310" y="-30" class="grid-bg" />
  </g>

  <!-- Tech Design Elements (Left & Right Side Decorations) -->
  <!-- Left Side: Code Node Architecture -->
  <g class="floating-box" transform="translate(20, 20)">
    <!-- Circuit lines -->
    <path d="M 20 60 L 90 60 L 120 110 M 90 60 L 90 160 L 40 210" fill="none" class="connecting-line" />
    
    <!-- Central Node -->
    <circle cx="90" cy="60" r="16" class="tech-node" />
    <circle cx="90" cy="60" r="6" fill="#06b6d4" class="pulse-glow" filter="url(#glow-cyan)" />
    
    <!-- Secondary Nodes -->
    <circle cx="20" cy="60" r="10" class="tech-node" />
    <circle cx="20" cy="60" r="3" fill="#d946ef" />

    <circle cx="120" cy="110" r="12" class="tech-node" />
    <circle cx="120" cy="110" r="4" fill="#a855f7" />

    <circle cx="40" cy="210" r="12" class="tech-node" />
    <circle cx="40" cy="210" r="4" fill="#06b6d4" />
    
    <!-- Code Bracket Graphic -->
    <text x="15" y="140" font-family="'Courier New', monospace" font-size="28" fill="#d946ef" opacity="0.3" font-weight="bold">{ }</text>
  </g>

  <!-- Right Side: Rotating Core System -->
  <g class="floating-box-delayed" transform="translate(750, 30)">
    <!-- Circuit connections -->
    <path d="M 110 90 L 40 90 L 10 140 M 40 90 L 40 10" fill="none" class="connecting-line" />
    
    <!-- Rotating Gear/Core -->
    <g transform="translate(110, 90)">
      <circle cx="0" cy="0" r="40" fill="none" stroke="#d946ef" stroke-dasharray="10 6" stroke-width="1.5" opacity="0.4" class="gear" />
      <circle cx="0" cy="0" r="30" fill="none" stroke="#06b6d4" stroke-dasharray="4 4" stroke-width="2" class="gear" style="animation-direction: reverse; animation-duration: 10s;" />
      <circle cx="0" cy="0" r="18" class="tech-node" />
      <polygon points="0,-6 5,4 -5,4" fill="#d946ef" class="pulse-glow" filter="url(#glow-purple)" transform="scale(1.2)" />
    </g>

    <!-- Secondary Nodes -->
    <circle cx="10" cy="140" r="10" class="tech-node" />
    <circle cx="10" cy="140" r="3" fill="#06b6d4" />

    <circle cx="40" cy="10" r="8" class="tech-node" />
    <circle cx="40" cy="10" r="2.5" fill="#a855f7" />
    
    <!-- Binary Stream Graphic -->
    <text x="30" y="200" font-family="'Courier New', monospace" font-size="11" fill="#06b6d4" opacity="0.25">
      <tspan x="30" dy="0">01001010</tspan>
      <tspan x="30" dy="14">01000001</tspan>
      <tspan x="30" dy="14">01010110</tspan>
      <tspan x="30" dy="14">01000001</tspan>
    </text>
  </g>

  <!-- Glowing Scanner Line -->
  <line x1="0" y1="0" x2="900" y2="0" class="scan-line" />

  <!-- Center Content -->
  <!-- Outer Bezel Card Background (Glassmorphism look) - WIDENED TO 540PX -->
  <rect x="180" y="55" width="540" height="170" rx="20" fill="#070712" stroke="url(#cyan-purple)" stroke-width="1.5" opacity="0.85" filter="url(#glow-purple)" />
  <rect x="185" y="60" width="530" height="160" rx="15" fill="#030308" opacity="0.9" />

  <!-- Terminal window dots on outer border of center card -->
  <circle cx="205" cy="78" r="5" fill="#ef4444" opacity="0.8" />
  <circle cx="220" cy="78" r="5" fill="#eab308" opacity="0.8" />
  <circle cx="235" cy="78" r="5" fill="#22c55e" opacity="0.8" />

  <!-- Terminal Label -->
  <text x="260" y="82" font-family="'Courier New', monospace" font-size="11" fill="#475569" letter-spacing="1">mihir@backend-server:~</text>

  <!-- Main Text -->
  <g transform="translate(450, 142)">
    <!-- Name (Font size reduced to 42px and letter spacing to 6px to prevent overflow) -->
    <text text-anchor="middle" class="neon-text-title">MIHIR GOVIND</text>
    
    <!-- Subtitle / Role -->
    <text y="40" text-anchor="middle" class="neon-text-subtitle">BACKEND DEVELOPER</text>
    
    <!-- Decorative brackets -->
    <path d="M -210 -40 L -230 -40 L -230 15 L -210 15" fill="none" stroke="url(#neon-cyan)" stroke-width="2.5" opacity="0.7" />
    <path d="M 210 -40 L 230 -40 L 230 15 L 210 15" fill="none" stroke="url(#neon-purple)" stroke-width="2.5" opacity="0.7" />
  </g>

  <!-- Bottom stats highlight line -->
  <path d="M 230 208 L 670 208" stroke="url(#cyan-purple)" stroke-width="1" stroke-linecap="round" opacity="0.5" />
</svg>
