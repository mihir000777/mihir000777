<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 380" width="1500" height="380">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0a0118"/>
      <stop offset="45%" stop-color="#050b1a"/>
      <stop offset="100%" stop-color="#001a14"/>
    </linearGradient>

    <!-- Name gradient: purple → cyan → green -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c084fc"/>
      <stop offset="50%"  stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>

    <!-- Horizontal scan line gradient -->
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#8b5cf6"/>
      <stop offset="70%"  stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>

    <!-- Separator line gradient -->
    <linearGradient id="sepGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#8b5cf6"/>
      <stop offset="80%"  stop-color="#10b981"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow filter for name — tight, sharp -->
    <filter id="nameGlow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft orb glow -->
    <filter id="orbGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.9" fill="#1a2235"/>
    </pattern>

    <!-- CSS animations -->
    <style>
      .cursor { animation: blink 1s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

      .p1 { animation: float1 3.2s ease-in-out infinite; }
      .p2 { animation: float2 4.0s ease-in-out infinite; }
      .p3 { animation: float3 2.8s ease-in-out infinite; }
      .p4 { animation: float4 3.6s ease-in-out infinite; }
      .p5 { animation: float5 5.0s ease-in-out infinite; }
      .p6 { animation: float6 3.8s ease-in-out infinite; }

      @keyframes float1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-18px)} }
      @keyframes float2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
      @keyframes float3 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
      @keyframes float4 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
      @keyframes float5 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-16px)} }
      @keyframes float6 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-22px)} }

      .scan { animation: scan 5s linear infinite; }
      @keyframes scan { 0%{transform:translateY(-10px);opacity:0} 10%{opacity:0.7} 90%{opacity:0.7} 100%{transform:translateY(390px);opacity:0} }

      .subtitleFade { animation: fadeIn 2s ease 0.5s both; }
      .tagsFade { animation: fadeIn 2s ease 1s both; }
      .terminalFade { animation: fadeIn 2s ease 1.5s both; }
      @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    </style>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="1500" height="380" fill="url(#bgGrad)"/>
  <rect width="1500" height="380" fill="url(#dots)" opacity="0.55"/>

  <!-- ── GLOW ORBS ── -->
  <ellipse cx="120" cy="190" rx="160" ry="160" fill="#8b5cf6" opacity="0.13" filter="url(#orbGlow)"/>
  <ellipse cx="1380" cy="190" rx="160" ry="160" fill="#10b981" opacity="0.13" filter="url(#orbGlow)"/>
  <ellipse cx="750" cy="155" rx="320" ry="110" fill="#06b6d4" opacity="0.04" filter="url(#orbGlow)"/>

  <!-- ── ANIMATED SCAN LINE ── -->
  <rect class="scan" x="0" y="0" width="1500" height="2.5" fill="url(#scanGrad)" opacity="0.75"/>

  <!-- ── CORNER BRACKETS ── -->
  <!-- top-left -->
  <line x1="0"    y1="0"  x2="70"   y2="0"   stroke="#8b5cf6" stroke-width="3.5"/>
  <line x1="0"    y1="0"  x2="0"    y2="70"  stroke="#8b5cf6" stroke-width="3.5"/>
  <!-- top-right -->
  <line x1="1500" y1="0"  x2="1430" y2="0"   stroke="#10b981" stroke-width="3.5"/>
  <line x1="1500" y1="0"  x2="1500" y2="70"  stroke="#10b981" stroke-width="3.5"/>
  <!-- bottom-left -->
  <line x1="0"    y1="380" x2="70"   y2="380" stroke="#06b6d4" stroke-width="3.5"/>
  <line x1="0"    y1="380" x2="0"    y2="310" stroke="#06b6d4" stroke-width="3.5"/>
  <!-- bottom-right -->
  <line x1="1500" y1="380" x2="1430" y2="380" stroke="#c084fc" stroke-width="3.5"/>
  <line x1="1500" y1="380" x2="1500" y2="310" stroke="#c084fc" stroke-width="3.5"/>

  <!-- ── BACKGROUND DECORATIVE TEXT ── -->
  <text x="55"  y="230" font-family="monospace" font-size="200" fill="#8b5cf6" opacity="0.07">{</text>
  <text x="1332" y="228" font-family="monospace" font-size="200" fill="#10b981" opacity="0.07">}</text>

  <!-- ── TOP-LEFT CODE COMMENT ── -->
  <text x="46" y="46" font-family="monospace" font-size="13" fill="#4a5568" opacity="0.9">// mihir.config.json</text>
  <text x="46" y="66" font-family="monospace" font-size="12" fill="#4a5568" opacity="0.7">
    <tspan fill="#f472b6" opacity="0.8">"stack"</tspan><tspan fill="#64748b">: </tspan><tspan fill="#86efac" opacity="0.8">["Java","Spring","Node.js","Docker"]</tspan>
  </text>

  <!-- ── TOP-RIGHT BADGE ── -->
  <rect x="1320" y="30" rx="6" ry="6" width="148" height="30" fill="#0d1117" stroke="#10b981" stroke-width="1" opacity="0.9"/>
  <text x="1394" y="50" font-family="monospace" font-size="12" fill="#34d399" text-anchor="middle">● AVAILABLE TO HIRE</text>

  <!-- ── MAIN NAME — gradient ── -->
  <text x="750" y="178"
    text-anchor="middle"
    font-family="'Arial Black', Impact, sans-serif"
    font-size="92"
    font-weight="900"
    fill="url(#nameGrad)"
    filter="url(#nameGlow)">MIHIR GOVIND</text>

  <!-- ── SUBTITLE ── -->
  <text class="subtitleFade" x="750" y="224"
    text-anchor="middle"
    font-family="monospace"
    font-size="21"
    fill="#94a3b8"
    letter-spacing="5">Backend Developer  ·  India 🇮🇳</text>

  <!-- ── SEPARATOR LINE ── -->
  <line x1="350" y1="245" x2="1150" y2="245" stroke="url(#sepGrad)" stroke-width="1" opacity="0.7"/>

  <!-- ── TECH TAGS ── -->
  <g class="tagsFade" font-family="monospace" font-size="14.5" text-anchor="middle">
    <text x="430"  y="276" fill="#c084fc">Java</text>
    <text x="475"  y="276" fill="#475569">·</text>
    <text x="540"  y="276" fill="#22d3ee">Spring Boot</text>
    <text x="620"  y="276" fill="#475569">·</text>
    <text x="685"  y="276" fill="#34d399">Node.js</text>
    <text x="745"  y="276" fill="#475569">·</text>
    <text x="800"  y="276" fill="#c084fc">Docker</text>
    <text x="858"  y="276" fill="#475569">·</text>
    <text x="920"  y="276" fill="#22d3ee">Firebase</text>
    <text x="988"  y="276" fill="#475569">·</text>
    <text x="1040" y="276" fill="#34d399">Redis</text>
    <text x="1088" y="276" fill="#475569">·</text>
    <text x="1128" y="276" fill="#c084fc">AWS</text>
  </g>

  <!-- ── TERMINAL COMMAND LINE ── -->
  <g class="terminalFade">
    <text x="750" y="332"
      text-anchor="middle"
      font-family="monospace"
      font-size="15"
      fill="#475569">
      <tspan fill="#34d399">mihir@github</tspan><tspan fill="#64748b">:</tspan><tspan fill="#22d3ee">~/projects</tspan><tspan fill="#94a3b8"> $ </tspan><tspan fill="#e2e8f0">./build-awesome-things --mode production</tspan>
    </text>
    <!-- Blinking cursor -->
    <rect class="cursor" x="1058" y="317" width="9" height="17" fill="#10b981"/>
  </g>

  <!-- ── FLOATING PARTICLES ── -->
  <circle class="p1" cx="205" cy="110" r="2.5" fill="#c084fc" opacity="0.65"/>
  <circle class="p2" cx="380" cy="295" r="2"   fill="#22d3ee" opacity="0.55"/>
  <circle class="p3" cx="1120" cy="88"  r="2.5" fill="#34d399" opacity="0.65"/>
  <circle class="p4" cx="1300" cy="275" r="2"   fill="#c084fc" opacity="0.55"/>
  <circle class="p5" cx="540"  cy="55"  r="1.8" fill="#22d3ee" opacity="0.45"/>
  <circle class="p6" cx="960"  cy="338" r="1.8" fill="#f472b6" opacity="0.45"/>
</svg>
