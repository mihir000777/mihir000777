<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 30" width="100%" height="100%">
  <defs>
    <!-- Cyan-purple linear gradient for the line -->
    <linearGradient id="div-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0" />
      <stop offset="15%" stop-color="#06b6d4" stop-opacity="0.3" />
      <stop offset="40%" stop-color="#06b6d4" stop-opacity="1" />
      <stop offset="50%" stop-color="#a855f7" stop-opacity="1" />
      <stop offset="60%" stop-color="#d946ef" stop-opacity="1" />
      <stop offset="85%" stop-color="#d946ef" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#d946ef" stop-opacity="0" />
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow-div" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulse-node {
      0% { transform: scale(1); filter: drop-shadow(0 0 2px #06b6d4); }
      50% { transform: scale(1.2); filter: drop-shadow(0 0 8px #a855f7); }
      100% { transform: scale(1); filter: drop-shadow(0 0 2px #06b6d4); }
    }
    .glowing-node {
      transform-origin: 450px 15px;
      animation: pulse-node 3s infinite ease-in-out;
      fill: #000000;
      stroke: url(#div-grad);
      stroke-width: 2;
    }
  </style>

  <!-- Glowing background path -->
  <path d="M 50 15 L 850 15" fill="none" stroke="url(#div-grad)" stroke-width="2" filter="url(#glow-div)" />
  
  <!-- Outer accent line -->
  <path d="M 250 15 L 650 15" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.8" />

  <!-- Center Diamond Node -->
  <polygon points="450,7 458,15 450,23 442,15" class="glowing-node" />
  
  <!-- Core element -->
  <circle cx="450" cy="15" r="2" fill="#ffffff" />
</svg>
